<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cek Load Model BabyCry</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #e0e7ff;
    --accent: #06b6d4;
    --bg: #0f172a;
    --bg-card: rgba(30, 41, 59, 0.7);
    --bg-card-solid: #1e293b;
    --border: rgba(148, 163, 184, 0.15);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --success: #10b981;
    --success-bg: rgba(16, 185, 129, 0.15);
    --danger: #ef4444;
    --danger-bg: rgba(239, 68, 68, 0.12);
    --warning: #f59e0b;
    --warning-bg: rgba(245, 158, 11, 0.12);
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(79, 70, 229, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
    -webkit-font-smoothing: antialiased;
  }

  /* Top nav link */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    transition: var(--transition);
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  .back-link:hover { color: var(--accent); }

  /* Main Card */
  .card {
    max-width: 900px;
    margin: 0 auto;
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    border-radius: var(--radius) var(--radius) 0 0;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }
  .header-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 8px 20px rgba(79, 70, 229, 0.35);
  }
  h1 {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff, var(--text-muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .subtitle code {
    background: rgba(79, 70, 229, 0.2);
    color: #a5b4fc;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
  }

  /* TF version badge */
  .tf-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(79, 70, 229, 0.1);
    border: 1px solid rgba(79, 70, 229, 0.25);
    color: #a5b4fc;
    padding: 0.45rem 1rem;
    border-radius: 100px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 1.5rem;
  }
  .tf-badge i { color: var(--primary); }

  /* Model rows */
  .row {
    background: var(--bg-card-solid);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    transition: var(--transition);
    animation: fadeSlideIn 0.4s ease-out both;
  }
  .row:nth-child(2) { animation-delay: 0.1s; }
  .row:nth-child(3) { animation-delay: 0.2s; }
  .row:hover { border-color: rgba(79, 70, 229, 0.3); transform: translateY(-1px); }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .row-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.85rem;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: #fff;
  }
  .row-header .model-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(79, 70, 229, 0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    color: var(--accent);
  }

  /* Status checks */
  .check-line {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.4rem 0;
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .check-line + .check-line { border-top: 1px solid var(--border); padding-top: 0.6rem; margin-top: 0.2rem; }

  .ok {
    color: var(--success);
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--success-bg);
    padding: 0.15rem 0.65rem;
    border-radius: 100px;
    font-size: 0.82rem;
  }
  .bad {
    color: var(--danger);
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--danger-bg);
    padding: 0.15rem 0.65rem;
    border-radius: 100px;
    font-size: 0.82rem;
  }
  .warn {
    color: var(--warning);
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--warning-bg);
    padding: 0.15rem 0.65rem;
    border-radius: 100px;
    font-size: 0.82rem;
  }

  code {
    background: rgba(148, 163, 184, 0.1);
    color: #a5b4fc;
    padding: 0.15rem 0.55rem;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
  }

  pre {
    white-space: pre-wrap;
    background: #0c1222;
    color: #fca5a5;
    padding: 1rem 1.25rem;
    border-radius: 10px;
    overflow: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    border: 1px solid rgba(239, 68, 68, 0.2);
    margin-top: 0.75rem;
    line-height: 1.5;
  }

  /* Loading spinner */
  .loading-state {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 2rem 0;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.95rem;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  .footer-note {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-top: 1.5rem;
    opacity: 0.7;
  }

  /* Responsive */
  @media (max-width: 575.98px) {
    body { padding: 1.25rem 0.75rem; }
    .card { padding: 1.5rem 1.15rem; border-radius: var(--radius-sm); }
    .header { gap: 0.75rem; }
    .header-icon { width: 42px; height: 42px; font-size: 1.25rem; }
    h1 { font-size: 1.35rem; }
    .subtitle { font-size: 0.85rem; margin-bottom: 1.5rem; }
    .tf-badge { font-size: 0.78rem; padding: 0.35rem 0.8rem; margin-bottom: 1rem; }
    .row { padding: 1rem; }
    .row-header { font-size: 0.95rem; }
    .row-header .model-icon { width: 32px; height: 32px; font-size: 0.95rem; }
    .check-line { font-size: 0.82rem; }
    code { font-size: 0.78rem; }
    pre { font-size: 0.78rem; padding: 0.75rem; }
  }
</style>
</head>
<body>

<div style="max-width:900px;margin:0 auto">
  <a class="back-link" href="index.html"><i class="bi bi-arrow-left"></i> Kembali ke Halaman Utama</a>
</div>

<div class="card">
  <div class="header">
    <div class="header-icon"><i class="bi bi-gpu-card"></i></div>
    <h1>Cek Load Model BabyCry</h1>
  </div>
  <p class="subtitle">Halaman ini untuk mengecek apakah <code>model.json</code> dan file <code>.bin</code> benar-benar bisa dibaca dari GitHub Pages.</p>
  <div id="result">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Memulai pengecekan model...</span>
    </div>
  </div>
</div>

<div class="footer-note">BabyCry Classifier &mdash; Model Diagnostic Tool</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script>
const paths = {
  "CNN-LSTM": "models/cnn_lstm/model.json",
  "CNN": "models/cnn/model.json",
  "RNN": "models/rnn/model.json"
};
const firstBin = {
  "CNN-LSTM": "models/cnn_lstm/group1-shard1of3.bin",
  "CNN": "models/cnn/group1-shard1of14.bin",
  "RNN": "models/rnn/group1-shard1of1.bin"
};
const el = document.getElementById('result');
function add(html){ el.insertAdjacentHTML('beforeend', html); }
async function checkBin(name, url){
  const r = await fetch(url, {cache:'no-store'});
  const b = await r.arrayBuffer();
  const head = new TextDecoder().decode(new Uint8Array(b.slice(0,80)));
  if(head.startsWith('version https://git-lfs.github.com/spec')){
    throw new Error('LFS POINTER: file .bin masih tersimpan sebagai Git LFS, bukan file model asli. Hapus .gitattributes lalu upload ulang file .bin biasa.');
  }
  if(b.byteLength < 100000){
    throw new Error('Ukuran .bin terlalu kecil (' + b.byteLength + ' bytes). Kemungkinan file rusak atau bukan file model asli.');
  }
  return b.byteLength;
}
async function main(){
  el.innerHTML = '';
  add('<div class="tf-badge"><i class="bi bi-cpu"></i> TensorFlow.js v'+tf.version.tfjs+'</div>');
  for(const [name, path] of Object.entries(paths)){
    add('<div class="row"><div class="row-header"><div class="model-icon"><i class="bi bi-diagram-3"></i></div>'+name+'</div>');
    try{
      let size;
      try {
        size = await checkBin(name, firstBin[name]);
      } catch (e) {
        if (e.message && e.message.includes('LFS POINTER')) throw e;
        const fallbackBin = firstBin[name].replace(/^models\//, '');
        size = await checkBin(name, fallbackBin);
      }
      add('<div class="check-line"><span>Cek file .bin:</span> <span class="ok"><i class="bi bi-check-circle-fill"></i> OK</span> <span style="color:#64748b;font-size:0.82rem">('+size.toLocaleString('id-ID')+' bytes)</span></div>');
      
      let model;
      try {
        model = await tf.loadLayersModel(path);
      } catch (err) {
        const fallbackPath = path.replace(/^models\//, '');
        model = await tf.loadLayersModel(fallbackPath);
      }
      add('<div class="check-line"><span>Load model:</span> <span class="ok"><i class="bi bi-check-circle-fill"></i> LOADED</span></div>');
      add('<div class="check-line"><span>Input shape:</span> <code>'+JSON.stringify(model.inputs.map(i=>i.shape))+'</code></div>');
      add('<div class="check-line"><span>Output shape:</span> <code>'+JSON.stringify(model.outputs.map(o=>o.shape))+'</code></div>');
      model.dispose();
    }catch(e){
      add('<div class="check-line"><span class="bad"><i class="bi bi-x-circle-fill"></i> GAGAL</span></div><pre>'+String(e.stack || e.message || e)+'</pre>');
    }
    add('</div>');
  }
}
main();
</script>
</body>
</html>
